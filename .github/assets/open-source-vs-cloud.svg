<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 270" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <!-- top brace: Open Source (green) over the first 6 chips -->
  <path d="M24 120 L24 108 L708 108 L708 120" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M366 108 L366 98" fill="none" stroke="#10B981" stroke-width="2" stroke-linecap="round"/>
  <text x="366" y="88" text-anchor="middle" fill="#10B981" font-size="17" font-weight="700">Nous — Open Source</text>

  <!-- chips -->
  <!-- open source (green) -->
  <g>
    <rect x="24"  y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="76"  y="165" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">get_context</text>
    <rect x="140" y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="192" y="165" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">get_account</text>
    <rect x="256" y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="308" y="165" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">query</text>
    <rect x="372" y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="424" y="158" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">Identity</text>
    <text x="424" y="174" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">resolution</text>
    <rect x="488" y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="540" y="165" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">MCP server</text>
    <rect x="604" y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#10B981" stroke-width="2"/>
    <text x="656" y="158" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">25+</text>
    <text x="656" y="174" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">integrations</text>
  </g>
  <!-- cloud only (violet) -->
  <g>
    <rect x="720" y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
    <text x="772" y="165" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">CRM sync</text>
    <rect x="836" y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
    <text x="888" y="165" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">Lead Lists</text>
    <rect x="952" y="130" width="104" height="60" rx="10" fill="#FFFFFF" stroke="#7C3AED" stroke-width="2"/>
    <text x="1004" y="165" text-anchor="middle" fill="#1F2937" font-size="12" font-weight="600">ICP model</text>
  </g>

  <!-- bottom brace: Cloud (violet) under all chips -->
  <path d="M24 200 L24 212 L1056 212 L1056 200" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M540 212 L540 222" fill="none" stroke="#7C3AED" stroke-width="2" stroke-linecap="round"/>
  <text x="540" y="240" text-anchor="middle" fill="#7C3AED" font-size="17" font-weight="700">Nous — Cloud</text>
</svg>
