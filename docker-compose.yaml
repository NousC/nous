services:
  # ── API (Express) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ghcr.io/goproply/proply-crm:latest
    restart: unless-stopped
    env_file:
      - ./proply.env
    environment:
      NODE_ENV: production
    depends_on:
      - redis

  # ── Background worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: ghcr.io/goproply/proply-crm-worker:latest
    restart: unless-stopped
    env_file:
      - ./proply.env
    environment:
      NODE_ENV: production
    depends_on:
      - api
      - redis

  # ── Frontend (nginx: static SPA) ─────────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        # Leave empty when using same-domain nginx proxy (self-hosted, no Caddy).
        # Set to https://api.yourdomain.com when using separate subdomains (Caddy / cloud).
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_GOOGLE_ANALYTICS_ID: ${VITE_GOOGLE_ANALYTICS_ID:-}
        VITE_DOCS_URL: ${VITE_DOCS_URL:-}
    image: ghcr.io/goproply/proply-crm-frontend:latest
    restart: unless-stopped
    depends_on:
      - api

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

  # ── Caddy (SSL + subdomain routing) ──────────────────────────────────────────
  # Remove this service if you handle SSL/routing externally (Cloudflare Tunnel, etc.)
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      API_DOMAIN: ${API_DOMAIN}
    depends_on:
      - frontend
      - api

volumes:
  redis_data:
  caddy_data:
  caddy_config:
