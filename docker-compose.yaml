services:
  # ── API (Express) ─────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    image: ghcr.io/goproply/proply-crm:latest
    restart: unless-stopped
    env_file:
      - ./proply.env
    environment:
      NODE_ENV: production
    depends_on:
      - redis
    # Not exposed directly — nginx inside the frontend container proxies /api/* here

  # ── Background worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: ghcr.io/goproply/proply-crm-worker:latest
    restart: unless-stopped
    env_file:
      - ./proply.env
    environment:
      NODE_ENV: production
    depends_on:
      - api
      - redis

  # ── Frontend (nginx: static SPA + /api proxy → api:3000) ─────────────────────
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # Baked into the JS bundle at build time
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        VITE_API_URL: ""
        VITE_STRIPE_PUBLISHABLE_KEY: ${VITE_STRIPE_PUBLISHABLE_KEY:-}
        VITE_POSTHOG_KEY: ${VITE_POSTHOG_KEY:-}
        VITE_GOOGLE_ANALYTICS_ID: ${VITE_GOOGLE_ANALYTICS_ID:-}
        VITE_DOCS_URL: ${VITE_DOCS_URL:-}
    image: ghcr.io/goproply/proply-crm-frontend:latest
    restart: unless-stopped
    ports:
      - "${PORT:-80}:80"
    depends_on:
      - api

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  redis_data:
